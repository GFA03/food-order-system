spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: users-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: restaurant-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/restaurants, /api/restaurants/**
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**
        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ai/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: omnieats-dev-secret-key-change-in-production
