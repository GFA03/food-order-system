spring.application.name=identity-service
server.port=8081

# Datasource — overridden by SPRING_DATASOURCE_* env vars in Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/identity_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — must match gateway-service secret
jwt.secret=${JWT_SECRET:omnieats-dev-secret-key-change-in-production}
jwt.expiration-ms=86400000
